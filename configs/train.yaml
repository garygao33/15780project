seed: 42
base_model_name: meta-llama/Llama-3.1-8B-Instruct
output_dir: outputs/llama31-8b-persuasion
use_qlora: true
max_seq_length: 2048
attn_implementation: sdpa

dataset:
  train_file: data/examples/train.jsonl
  validation_file: data/examples/validation.jsonl
  text_field: text

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  num_train_epochs: 1
  logging_steps: 5
  eval_strategy: steps
  eval_steps: 25
  save_steps: 25
  save_total_limit: 2
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  gradient_checkpointing: true
  report_to:
    - none

